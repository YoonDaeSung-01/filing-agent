services:
  pgvector:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: filing_agent
      POSTGRES_USER: filing
      POSTGRES_PASSWORD: filing
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filing -d filing_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
